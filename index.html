<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps AI — Coming Soon | A RainTech Solution</title>
<meta name="description" content="DevOps AI — The AI-as-a-Service platform for modern MSPs. Coming soon.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #001233;
    color: #E0E7EF;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Subtle gradient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(0, 120, 212, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(139, 219, 2, 0.05) 0%, transparent 60%);
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    max-width: 560px;
  }

  .logo {
    width: 64px;
    height: 64px;
    margin-bottom: 2rem;
  }

  h1 {
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
    color: #FFFFFF;
  }

  h1 span {
    background: linear-gradient(135deg, #8BDB02, #0078D4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-size: 1.05rem;
    color: #8B97A8;
    margin-bottom: 3rem;
    line-height: 1.6;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(139, 219, 2, 0.08);
    border: 1px solid rgba(139, 219, 2, 0.2);
    border-radius: 100px;
    padding: 0.6rem 1.4rem;
    font-size: 0.875rem;
    font-weight: 600;
    color: #8BDB02;
  }

  .status::before {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #8BDB02;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .footer {
    position: fixed;
    bottom: 2rem;
    z-index: 1;
    font-size: 0.8rem;
    color: #4A5568;
  }

  .footer a {
    color: #6B7A8D;
    text-decoration: none;
  }

  .footer a:hover {
    color: #8BDB02;
  }
</style>
</head>
<body>

<div class="container">
  <img src="favicon.svg" alt="DevOps AI" class="logo">
  <h1>DevOps <span>AI</span></h1>
  <p class="tagline">The AI-as-a-Service platform for modern MSPs.<br>We're putting the finishing touches on something great.</p>
  <div class="status">Coming Soon</div>
</div>

<div class="footer">
  DevOps AI Platform &mdash; A <a href="https://rain.tech">RainTech</a> Solution
</div>

</body>
</html>
