<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cetacean:     #001647;
    --cetacean-deep:#000E2D;
    --ghost:        #F7F7FF;
    --green-bright: #8BDB02;
    --green-primary:#4A7A00;
    --azure-blue:   #0078D4;
    --sky-chip:     #4FC3F7;
    --text-muted:   rgba(247, 247, 255, 0.55);
    --text-faint:   rgba(247, 247, 255, 0.3);
    --border-subtle:rgba(247, 247, 255, 0.08);
  }

  html {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  body {
    min-height: 100dvh;
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--cetacean-deep);
    color: var(--ghost);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* === Animated background === */
  .bg-grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .bg-grid::before {
    content: '';
    position: absolute;
    inset: -50%;
    background-image:
      linear-gradient(rgba(139, 219, 2, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139, 219, 2, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridDrift 30s linear infinite;
  }

  .bg-grid::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 800px;
    height: 800px;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse at center,
      rgba(0, 120, 212, 0.08) 0%,
      rgba(139, 219, 2, 0.04) 40%,
      transparent 70%);
    animation: pulseGlow 8s ease-in-out infinite;
  }

  @keyframes gridDrift {
    0% { transform: translate(0, 0); }
    100% { transform: translate(60px, 60px); }
  }

  @keyframes pulseGlow {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
  }

  /* === Floating particles === */
  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .particle:nth-child(1) {
    width: 4px; height: 4px;
    background: var(--green-bright);
    top: 20%; left: 15%;
    opacity: 0.3;
    animation: float1 12s ease-in-out infinite;
  }

  .particle:nth-child(2) {
    width: 3px; height: 3px;
    background: var(--sky-chip);
    top: 60%; left: 80%;
    opacity: 0.25;
    animation: float2 15s ease-in-out infinite;
  }

  .particle:nth-child(3) {
    width: 5px; height: 5px;
    background: var(--azure-blue);
    top: 75%; left: 25%;
    opacity: 0.2;
    animation: float3 18s ease-in-out infinite;
  }

  .particle:nth-child(4) {
    width: 3px; height: 3px;
    background: var(--green-bright);
    top: 35%; left: 70%;
    opacity: 0.2;
    animation: float1 20s ease-in-out infinite reverse;
  }

  .particle:nth-child(5) {
    width: 4px; height: 4px;
    background: var(--sky-chip);
    top: 80%; left: 55%;
    opacity: 0.15;
    animation: float2 14s ease-in-out infinite reverse;
  }

  @keyframes float1 {
    0%, 100% { transform: translate(0, 0); }
    25% { transform: translate(30px, -20px); }
    50% { transform: translate(-10px, -40px); }
    75% { transform: translate(20px, -15px); }
  }

  @keyframes float2 {
    0%, 100% { transform: translate(0, 0); }
    33% { transform: translate(-25px, 15px); }
    66% { transform: translate(15px, -30px); }
  }

  @keyframes float3 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(20px, -25px); }
  }

  /* === Main content === */
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 2rem;
    max-width: 640px;
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* === Logo mark === */
  .logo-mark {
    width: 96px;
    height: 96px;
    margin-bottom: 2.5rem;
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
    filter: drop-shadow(0 0 40px rgba(0, 120, 212, 0.2));
  }

  /* === Wordmark === */
  .wordmark {
    font-size: clamp(2.5rem, 1.5rem + 4vw, 4rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 1.5rem;
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
  }

  .wordmark .devops {
    color: var(--ghost);
  }

  .wordmark .ai {
    background: linear-gradient(135deg, var(--green-bright), var(--sky-chip));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* === Tagline === */
  .tagline {
    font-size: clamp(1rem, 0.9rem + 0.5vw, 1.25rem);
    font-weight: 400;
    color: var(--text-muted);
    line-height: 1.6;
    max-width: 440px;
    margin-bottom: 3rem;
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.45s both;
  }

  /* === Divider === */
  .divider {
    width: 48px;
    height: 2px;
    background: linear-gradient(90deg, var(--green-bright), var(--sky-chip));
    border-radius: 1px;
    margin-bottom: 3rem;
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both;
  }

  /* === Coming soon badge === */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.625rem 1.25rem;
    border: 1px solid var(--border-subtle);
    border-radius: 9999px;
    font-size: 0.8125rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: rgba(247, 247, 255, 0.03);
    backdrop-filter: blur(8px);
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.75s both;
  }

  .badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green-bright);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* === Footer === */
  footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 1;
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.9s both;
  }

  .powered-by {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-faint);
    letter-spacing: 0.04em;
    text-decoration: none;
    transition: color 0.2s ease;
  }

  .powered-by:hover {
    color: var(--text-muted);
  }

  .raintech-logo {
    height: 18px;
    width: auto;
    opacity: 0.5;
    transition: opacity 0.2s ease;
  }

  .powered-by:hover .raintech-logo {
    opacity: 0.75;
  }

  .pplx-link {
    font-size: 0.6875rem;
    color: var(--text-faint);
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: color 0.2s ease;
  }

  .pplx-link:hover {
    color: var(--text-muted);
  }

  /* === Mobile === */
  @media (max-width: 480px) {
    .logo-mark {
      width: 72px;
      height: 72px;
      margin-bottom: 2rem;
    }

    .tagline {
      margin-bottom: 2rem;
    }

    .divider {
      margin-bottom: 2rem;
    }

    footer {
      flex-direction: column;
      gap: 0.75rem;
      padding: 1rem;
      text-align: center;
    }
  }

  /* === Reduced motion === */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>

  <!-- Wordmark -->
