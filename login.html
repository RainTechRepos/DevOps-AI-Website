<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — DevOps AI by RainTech</title>
<meta name="description" content="Sign in to DevOps AI to manage your MSP operations, monitor zones, and access your AI-orchestrated control plane.">
<link rel="canonical" href="https://devops.ai.rain.tech/login.html">

<meta property="og:type" content="website">
<meta property="og:title" content="Sign In — DevOps AI">
<meta property="og:description" content="Access your DevOps AI dashboard. Sign in with Microsoft to manage your MSP operations.">
<meta property="og:url" content="https://devops.ai.rain.tech/login.html">
<meta property="og:site_name" content="DevOps AI by RainTech">

<link rel="icon" type="image/svg+xml" href="favicon.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="base.css">
<link rel="stylesheet" href="style.css">

<style>
  .login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-8) var(--gutter);
    background: var(--bg-secondary);
    position: relative;
    overflow: hidden;
  }

  .login-page::before {
    content: '';
    position: absolute;
    top: -40%;
    left: -20%;
    width: 80%;
    height: 80%;
    background: radial-gradient(ellipse, rgba(5, 16, 142, 0.4) 0%, transparent 70%);
    pointer-events: none;
  }

  .login-page::after {
    content: '';
    position: absolute;
    bottom: -30%;
    right: -10%;
    width: 60%;
    height: 60%;
    background: radial-gradient(ellipse, rgba(139, 219, 2, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .login-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    background: var(--bg-card);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-lg);
    padding: var(--space-12) var(--space-10);
    text-align: center;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .login-logo {
    display: block;
    margin: 0 auto var(--space-8);
    height: 44px;
    width: auto;
  }

  .login-heading {
    font-size: var(--text-xl);
    font-weight: var(--font-weight-bold);
    color: var(--text-primary);
    margin-bottom: var(--space-2);
  }

  .login-subtext {
    font-size: var(--text-sm);
    color: var(--text-secondary);
    margin-bottom: var(--space-10);
    line-height: 1.6;
  }

  .ms-sign-in-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    max-width: 320px;
    padding: 12px 24px;
    background: #ffffff;
    color: #5e5e5e;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 15px;
    font-weight: 600;
    border: 1px solid #8c8c8c;
    border-radius: 4px;
    cursor: pointer;
    text-decoration: none;
    transition: background-color 0.15s, border-color 0.15s, box-shadow 0.15s;
  }

  .ms-sign-in-btn:hover {
    background: #f3f3f3;
    border-color: #6e6e6e;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    color: #5e5e5e;
  }

  .ms-sign-in-btn:active {
    background: #e5e5e5;
  }

  .ms-sign-in-btn svg {
    width: 21px;
    height: 21px;
    flex-shrink: 0;
  }

  .login-divider {
    display: flex;
    align-items: center;
    gap: var(--space-4);
    margin: var(--space-8) 0;
    color: var(--text-tertiary);
    font-size: var(--text-xs);
  }

  .login-divider::before,
  .login-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-default);
  }

  .login-footer {
    margin-top: var(--space-8);
    padding-top: var(--space-6);
    border-top: 1px solid var(--border-default);
  }

  .login-footer a {
    font-size: var(--text-sm);
    color: var(--text-tertiary);
    transition: color var(--duration-fast);
  }

  .login-footer a:hover {
    color: var(--accent);
  }

  .login-help {
    margin-top: var(--space-6);
    font-size: var(--text-xs);
    color: var(--text-muted);
    line-height: 1.6;
  }

  .login-help a {
    color: var(--text-tertiary);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .login-help a:hover {
    color: var(--accent);
  }

  @media (max-width: 480px) {
    .login-card {
      padding: var(--space-8) var(--space-6);
    }
  }
</style>
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <a href="index.html" aria-label="DevOps AI Home">
      <img src="assets/logo-powered-by.png" alt="DevOps AI — Powered by RainTech" class="login-logo" width="200" height="44">
    </a>

    <h1 class="login-heading">Sign in to DevOps AI</h1>
    <p class="login-subtext">Access your AI-orchestrated MSP control plane to manage operations, monitor zones, and drive results.</p>

    <a href="https://app.devops.ai.rain.tech" class="ms-sign-in-btn">
      <!-- Microsoft logo (4-square) -->
      <svg viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      Sign in with Microsoft
    </a>

    <div class="login-divider">or</div>

    <p class="login-subtext" style="margin-bottom: 0;">
      New to DevOps AI? <a href="marketplace.html" style="color: var(--accent); text-decoration: underline; text-underline-offset: 2px;">Get started on Azure Marketplace</a>
    </p>

    <div class="login-footer">
      <a href="index.html">&larr; Back to home</a>
    </div>

    <p class="login-help">
      Having trouble signing in? <a href="contact.html">Contact support</a>
    </p>
  </div>
</div>

</body>
</html>
